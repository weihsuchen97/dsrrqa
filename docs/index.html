<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSRRQA — 下載</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e8e8ec;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hero {
      max-width: 640px;
      width: 100%;
      padding: 80px 24px 40px;
      text-align: center;
    }

    .hero h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    .hero p {
      font-size: 1.1rem;
      color: #9999aa;
      margin-bottom: 48px;
      line-height: 1.6;
    }

    .downloads {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .btn-win {
      background: rgba(59, 130, 246, 0.15);
      color: #60a5fa;
    }
    .btn-win:hover {
      background: rgba(59, 130, 246, 0.25);
      border-color: rgba(59, 130, 246, 0.3);
    }

    .btn-mac {
      background: rgba(168, 85, 247, 0.15);
      color: #c084fc;
    }
    .btn-mac:hover {
      background: rgba(168, 85, 247, 0.25);
      border-color: rgba(168, 85, 247, 0.3);
    }

    .btn svg { width: 20px; height: 20px; }

    .version-info {
      margin-top: 48px;
      padding: 20px 24px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      max-width: 640px;
      width: 100%;
    }

    .version-info h3 {
      font-size: 0.85rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    #release-info {
      font-size: 0.95rem;
      color: #9999aa;
      line-height: 1.6;
    }

    .footer {
      margin-top: auto;
      padding: 32px 24px;
      font-size: 0.85rem;
      color: #555;
    }

    .footer a { color: #888; text-decoration: none; }
    .footer a:hover { color: #bbb; }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 500;
      background: rgba(255,255,255,0.06);
      color: #888;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="badge" id="version-badge">loading...</div>
    <h1>DSRRQA</h1>
    <p>你的桌面小助手 — 待辦事項、天氣、桌面寵物，一次搞定。</p>

    <div class="downloads">
      <a class="btn btn-win" id="dl-windows" href="https://github.com/weihsuchen97/dsrrqa/releases/latest" target="_blank">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 12V6.75l8-1.25V12H3zm0 .5h8v6.5l-8-1.25V12.5zM11.5 5.35l9.5-1.6V12h-9.5V5.35zM11.5 12.5H21v7.75l-9.5-1.6V12.5z"/></svg>
        Windows 下載
      </a>
      <a class="btn btn-mac" id="dl-mac" href="https://github.com/weihsuchen97/dsrrqa/releases/latest" target="_blank">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        macOS 下載
      </a>
    </div>

    <div class="version-info">
      <h3>最新版本</h3>
      <div id="release-info">正在取得版本資訊…</div>
    </div>
  </div>

  <div class="footer">
    <a href="https://github.com/weihsuchen97/dsrrqa" target="_blank">GitHub</a>
  </div>

  <script>
    const REPO = 'weihsuchen97/dsrrqa'

    async function fetchRelease() {
      try {
        const res = await fetch(`https://api.github.com/repos/${REPO}/releases/latest`)
        if (!res.ok) throw new Error('No release found')
        const data = await res.json()

        document.getElementById('version-badge').textContent = data.tag_name
        document.getElementById('release-info').textContent = data.body
          ? data.body.substring(0, 300)
          : `${data.tag_name} — ${new Date(data.published_at).toLocaleDateString('zh-TW')}`

        const assets = data.assets || []

        // Windows: prefer .msi, fallback to .exe
        const winAsset = assets.find(a => a.name.endsWith('.msi'))
          || assets.find(a => a.name.endsWith('.exe'))
        if (winAsset) {
          document.getElementById('dl-windows').href = winAsset.browser_download_url
        }

        // macOS: prefer .dmg
        const macAsset = assets.find(a => a.name.endsWith('.dmg'))
        if (macAsset) {
          document.getElementById('dl-mac').href = macAsset.browser_download_url
        }
      } catch {
        document.getElementById('version-badge').textContent = 'v0.1.0'
        document.getElementById('release-info').textContent = '尚未發布正式版本，請先至 GitHub Releases 頁面查看。'
      }
    }

    fetchRelease()
  </script>
</body>
</html>
